spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true
      hibernate.type.preferred_uuid_jdbc_type: CHAR
      logging:
        level:
          org.hibernate.SQL: debug
          org.hibernate.orm.schema: debug

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
    default-redirect-uri: http://localhost:3000/oauth/callback

server:
  forward-headers-strategy: native

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME}
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region:
      static: ${S3_REGION}
    stack:
      auto: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000 # 1시간 (1000 * 60 * 60)
  refresh-token-expiration: 604800000 # 7일 (1000 * 60 * 60 * 24 * 7)
  token-type-claim: "token_type"
  access-token-type: "access"
  refresh-token-type: "refresh"
  redis-prefix-refresh: "dentruth:refreshToken:"

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}

openai:
  api:
    key: ${OPEN_AI_KEY}
  audio-model: whisper-1
  whisper-url: "https://api.openai.com/v1/audio/transcriptions"
  chat-model: gpt-4o-mini
  chat-url: "https://api.openai.com/v1/chat/completions"
  prompts:
    consultation-summary: |
        You are an expert dental transcription and summarization AI. Your task is to analyze the provided Korean dental consultation transcript (STT) and extract accurate diagnostic results, treatment plans, potential risks of delayed treatment, and post-treatment instructions.
        You must return the result as a raw JSON object matching the exact structure below. Do not include any conversational text, markdown formatting (like ```json), or code blocks in your response. Just return the pure JSON string.
        
        [Strict Language Rule]
        - "title", "diagnosticResults", and "treatmentSummary" are English-only fields. Write them directly in natural English. Do NOT write a Korean version of these three fields, and do NOT add "titleEng" or similar Eng-suffixed counterparts for them — they already are the English output.
        - All other fields ending with 'Eng' must be professionally translated into English.
        - All other fields (without 'Eng', excluding the three English-only fields above) must be in natural, polite Korean suitable for a patient-facing application.
        
        [Expected Output JSON Schema]
        {
          "title": "A natural, patient-facing headline summarizing what this visit was about (English, max 20 characters)",
          "diagnosticResults": "Short diagnosis name for display (English, max 20 characters)",
          "treatmentSummary": "One-line summary of the entire treatment plan (English, max 30 characters)",
          "diagnosis": {
            "summary": "Main diagnosis name in Korean",
            "summaryEng": "Main diagnosis name in English",
            "description": "Explanation of the condition and why treatment is needed in Korean",
            "descriptionEng": "Explanation of the condition and why treatment is needed in English"
          },
          "treatmentPlan": [
            {
              "step": 1,
              "plan": "First step of the treatment plan in Korean",
              "planEng": "First step of the treatment plan in English"
            }
          ],
          "treatmentDelay": [
            {
              "title": "A short bold title representing the risk if delayed (Korean)",
              "titleEng": "A short bold title representing the risk if delayed (English)",
              "description": "Detailed consequences and cost/complexity increases (Korean)",
              "descriptionEng": "Detailed consequences and cost/complexity increases (English)"
            }
          ],
          "treatmentAfterCare": [
            {
              "title": "Precautions or instructions after treatment (Korean)",
              "titleEng": "Precautions or instructions after treatment (English)",
              "description": "Detailed explanation of why or how to follow the instruction (Korean)",
              "descriptionEng": "Detailed explanation of why or how to follow the instruction (English)"
            }
          ]
        }
        
        [Contextual Rules for Extraction]
        1. Tooth Numbers: If specific teeth are mentioned (e.g., #46, #45), include them accurately in both Korean and English fields.
        2. Treatment Tone: The Korean 'description' must use polite and warm honorifics (e.g., '~한 상태예요', '~일 수 있어요').
        3. Multi-unit Steps: Break down the treatment plan chronologically into separate array elements with sequential 'step' integers (1, 2, 3...).
        4. Title Fields (IMPORTANT: "title" and "treatmentSummary" must NOT be the same text — they serve different purposes):
            - "title" is the headline of the visit itself, shown at the top of the record card, written directly in English. It should read like a short session/visit name (e.g. what kind of appointment or procedure this was), not a restatement of the treatment plan.
            - "diagnosticResults" must be a concise English version of "diagnosis.summary" (maximum 20 English characters).
            - "treatmentSummary" must condense the entire treatment plan into one short phrase (maximum 30 English characters), written directly in English, suitable as a plan/summary line inside the card body.
            - Example: if diagnosis.summary is "치근단 치주염" → diagnosticResults is "Apical Periodontitis".
            - Example: if the visit was a first-time root canal consultation → title is "Root Canal Consultation".
            - Example: if treatmentPlan involves root canal therapy and a bridge → treatmentSummary is "Root Canal + Bridge".
        
        [Example Output]
        {
          "title": "Root Canal Consultation",
          "diagnosticResults": "Apical Periodontitis",
          "treatmentSummary": "Root Canal + Bridge",
          "diagnosis": {
            "summary": "치근단 치주염",
            "summaryEng": "Apical Periodontitis",
            "description": "치아 뿌리 끝에 염증이 생긴 상태예요. 신경 치료를 통해 염증을 없애고 치아를 살릴 수 있어요.",
            "descriptionEng": "The nerve inside the tooth is dead, causing an infection at the tip of the root."
          },
          "treatmentPlan": [
            {
              "step": 1,
              "plan": "오른쪽 아래 첫 번째 큰 어금니(#46) 신경치료",
              "planEng": "Root canal therapy on the lower right first molar (#46)"
            }
          ],
          "treatmentDelay": [],
          "treatmentAfterCare": []
        }
    consult-translation: |
      You are a professional dental interpreter.

      Based on the information below, generate a JSON object.

      Chief Complaint:
      %s

      Concern:
      %s

      Question:
      %s

      Tasks:
      1. Rewrite the chief complaint as a natural, professional English sentence suitable for a dentist.
         Save it as "painOrigin".

      2. Translate "painOrigin" into natural Korean.
         Save it as "painKo".

      3. Extract the pain location mentioned in "painOrigin" and translate ONLY the pain location into Korean.
         Save it as "painLocationKo".

         Examples:
         - Lower right molar → 오른쪽 아래 어금니
         - Upper left incisor → 왼쪽 위 앞니
         - Left cheek → 왼쪽 볼
         - Lower jaw → 아래턱

      4. Summarize the concern and question into one concise Korean sentence.
         Save it as "visitPurpose".

      Return ONLY valid JSON.

      {
        "painOrigin": "...",
        "painKo": "...",
        "painLocationKo": "...",
        "visitPurpose": "..."
      }
    recommend-question: |
      You are a professional dental assistant.
    
      Patient Information
    
      Pain Location:
      %s
    
      Pain Level:
      %s
    
      Pain Persistence:
      %s
    
      Pain Duration:
      %s
    
      Concern:
      %s
    
      Question:
      %s
    
      Based on the patient's information, generate three concise questions that a dentist should ask during the consultation.
    
      Requirements:
        - Questions should help clarify symptoms or treatment planning.
        - Avoid duplicate meanings.
        - Keep each question under 30 words.
        - Return ONLY valid JSON.
    
      {
        "recommendedQuestions": [
          "...",
          "...",
          "..."
        ]
      }

email:
  google:
    email: ${EMAIL_GOOGLE_EMAIL}
    password: ${EMAIL_GOOGLE_PASSWORD}

consultation-summary:
  scheduler-fixed-rate: 600000
  scheduler-initial-delay: 60000