name: DenTruth CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  # 1. 테스트
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Test with Gradle
        run: ./gradlew test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # 2. 빌드 & EC2 배포
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew clean build -x test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          username: ubuntu
          host: ${{ secrets.HOST }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "build/libs/*-SNAPSHOT.jar"
          target: "/home/ubuntu/dentruth"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.HOST }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/dentruth

            # .env 파일 생성
            cat > .env <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            # .env 로드
            export $(cat .env | xargs)

            # 기존 프로세스 종료
            EXISTING_PID=$(lsof -ti tcp:8080)
            if [ -n "$EXISTING_PID" ]; then
              echo "기존 프로세스 종료: $EXISTING_PID"
              kill -15 "$EXISTING_PID"
              sleep 5
              RECHECK_PID=$(lsof -ti tcp:8080)
              if [ -n "$RECHECK_PID" ]; then
                kill -9 "$RECHECK_PID"
                sleep 2
              fi
            fi

            # 최신 jar 실행
            JAR_NAME=$(ls -t /home/ubuntu/dentruth/*.jar | grep -v 'plain' | head -n 1)
            echo "실행할 JAR: $JAR_NAME"
            nohup java -Dfile.encoding=UTF-8 -jar "$JAR_NAME" > /home/ubuntu/dentruth/app.log 2>&1 &

            # 15초 뒤 확인
            sleep 15
            NEW_PID=$(lsof -ti tcp:8080)
            if [ -n "$NEW_PID" ]; then
              echo "배포 성공 (PID: $NEW_PID)"
            else
              echo "배포 실패 - 로그 확인: tail -f /home/ubuntu/dentruth/app.log"
              exit 1
            fi
